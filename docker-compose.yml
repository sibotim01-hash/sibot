version: '3.9'

services:
  # PostgreSQL ma'lumotlar bazasi
  postgres:
    image: postgres:16-alpine
    container_name: multichannel_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
      POSTGRES_DB: multichannel_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Telegram Bot
  bot:
    build: .
    container_name: multichannel_bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-strongpassword}@postgres:5432/multichannel_bot
    volumes:
      - ./logs:/app/logs
    command: python bot.py

volumes:
  postgres_data:
